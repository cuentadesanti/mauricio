version: 1.2.4
cache: true

endpoints:
  custom:
    - name: "Personal AI"
      apiKey: "${BACKEND_API_KEY}"
      baseURL: "http://backend:8000/v1"
      models:
        default: ["personal-ai", "personal-ai-quick"]
        fetch: false
      titleConvo: true
      titleModel: "personal-ai-quick"      # generamos el título con el barato
      modelDisplayLabel: "Personal AI"
      summarize: false
