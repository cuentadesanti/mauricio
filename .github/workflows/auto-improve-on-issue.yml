name: auto-improve-on-issue

# When an issue is labeled 'feature-request', dispatch it to the Mauricio backend
# which runs triage and optionally opens a PR.
# Issue body format expected:
#   SUMMARY: one line description
#   USE CASES:
#   - use case 1
#   - use case 2
#   EXTERNAL APIS: Twilio, etc.  (optional)

on:
  issues:
    types: [labeled]

jobs:
  trigger-bot:
    if: github.event.label.name == 'feature-request'
    runs-on: ubuntu-latest
    steps:
      - name: dispatch feature request to backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Strip "feat: " prefix from title if present
          TITLE=$(echo "$ISSUE_TITLE" | sed 's/^feat: //' | tr ' ' '_' | tr -cd '[:alnum:]_')

          curl -fsS -X POST "${BACKEND_URL}/admin/feature-request" \
            -H "Authorization: Bearer ${BACKEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"${TITLE}\",
              \"summary\": $(echo "$ISSUE_BODY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'),
              \"use_cases\": [],
              \"external_apis\": [],
              \"source\": \"github_issue\"
            }"

      - name: comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 Feature request received. Mauricio is analyzing feasibility — a PR may follow shortly.',
            });
